  <rect x="240" y="492" width="14" height="14" rx="3" fill="#7F77DD"/>
  <text x="260" y="504"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" fill="#3d3d3a">Pi0 policy server (Ray Serve)</text>

  <rect x="476" y="492" width="14" height="14" rx="3" fill="#D85A30"/>
  <text x="496" y="504"
